<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Contato.css">
    <script src="https://kit.fontawesome.com/6a8e84955a.js" crossorigin="anonymous"></script>
    <title>Pass Up</title>
</head>
<body>
    <header>
        <h1>Contato</h1>
        <nav>
            <ul class="navbar">
                <li><a class="nav-itens" href="../index.html">Home</a></li>
                <li><a class="nav-itens" href="./Sobre.html">Sobre</a></li>
                <li><a class="nav-itens" href="./QuemSomos.html">Quem Somos?</a></li>
                <li><a class="nav-itens" href="./FAQ.html">FAQ</a></li>
                <li><a class="nav-itens" href="./Saldo.html">Saldo</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Lista de contato -->
        <ul class="lista-contato">
            <li class="CONTATO">Lista de Contato:</li>
            <li class="email">
                <i class="fa-solid fa-at"></i>
                E-mail: <a href="mailto:sac@soulup.io">sac@soulup.io</a>
            </li>
            <li class="instagram">
                <i class="fa-brands fa-instagram"></i>
                <a href="https://www.instagram.com/soulupoficial/">Instagram</a>
            </li>
            <li class="Facebook">
                <i class="fa-brands fa-facebook"></i>
                <a href="https://www.facebook.com/soulprimeoficial/">Facebook</a>
            </li>
            <li class="Linkedin">
                <i class="fa-brands fa-linkedin"></i>
                <a href="https://www.linkedin.com/company/soulprimeio">LinkedIn</a>
            </li>
        </ul>

        <!-- Formulário de contato -->
        <h2 class="CONTATO">Formulário de Contato:</h2>
        <form class="formulario-texto">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Pass Up. Todos direitos reservados.</p>
    </footer>
</body>
</html>
