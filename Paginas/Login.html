<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Login.css">
    <title>Pass Up</title>
</head>
<body>
    <header>
        <h1>Entrar</h1>
        <a class="botao" href="../index.html">Home</a>
    </header>
    <main>
        <section class="campo-login">
            <div class="parte-infos">
            <label for="nome">Nome de Usuario:</label>
            <input class="caixa-texto" type="text" name="nome" placeholder="Digite seu nome">
            <label for="senha">Senha:</label>
            <input class="caixa-texto" type="password" name="senha" placeholder="Digite sua senha">
            <button type="submit">Logar</button>
            </div>
            <div class="parte-registrar">
                <p>Ainda não tem uma conta?</p>
                <a class="link-registrar" href="./Registrar.html">Clique aqui para se registrar</a>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; todos direitos reservados.</p>
    </footer>
<script src="../JavaScript/Login.js"></script>
</body>
</html>
