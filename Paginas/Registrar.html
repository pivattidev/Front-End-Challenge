<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Registrar.css">
    <title>Pass Up</title>
</head>
<body>
    <header>
        <h1>Registrar</h1>
        <a class="botao" href="../index.html">Home</a>
    </header>
    <main>
        <section class="campo-login">
            <div class="parte-infos">
            <label for="nome">Nome de Usuario:</label>
            <input class="caixa-texto" type="text" name="nome" placeholder="Digite seu nome">
            <label for="senha">Senha:</label>
            <input class="caixa-texto" type="password" name="senha" placeholder="Digite sua senha">
            <label for="email">Email:</label>
            <input class="caixa-texto" type="email" name="email" placeholder="Digite seu email">
            <label for="numero">Numero de telefone:</label>
            <input class="caixa-texto" type="number" name="numero" placeholder="Digite seu numero">
            <button type="submit">Registrar</button>
            </div>
            <div class="parte-registrar">
                <p>Já tem uma conta?</p>
                <a class="link-registrar" href="./Login.html">Clique aqui para logar</a>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; todos direitos reservados.</p>
    </footer>
    <script src="../JavaScript/Registrar.js"></script>
</body>
</html>
